<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Acceso WiFi Invitados</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:0;background:#f6f7fb}
    .wrap{max-width:520px;margin:40px auto;padding:16px}
    .card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
    label{display:block;margin:10px 0 6px;font-weight:600}
    input,textarea{width:100%;padding:10px;border:1px solid #d7dbe7;border-radius:10px;font-size:16px}
    button{width:100%;margin-top:14px;padding:12px;border:0;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer}
    .muted{color:#6b7280;font-size:13px;margin-top:10px}
    .err{color:#b42318;font-size:13px;margin-top:10px;white-space:pre-wrap}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>WiFi de Invitados</h2>
      <p class="muted">Completa el formulario para solicitar acceso.</p>

      <form id="f">
        <label>Nombre</label>
        <input name="nombre" required />

        <label>Empresa / Visitante de</label>
        <input name="empresa" required />

        <label>Motivo de conexión</label>
        <textarea name="motivo" rows="3" required></textarea>

        <label>Email (opcional)</label>
        <input name="email" type="email" />

        <label>Teléfono (opcional)</label>
        <input name="telefono" />

        <button id="btn" type="submit">Enviar y conectar</button>
        <div id="msg" class="muted"></div>
        <div id="err" class="err"></div>
      </form>
    </div>
  </div>

<script>
  // 1) PEGA AQUÍ tu endpoint de Apps Script:
  const SHEET_ENDPOINT = "https://script.google.com/macros/s/AKfycbzBJRX11VWrDL6OhXvoVrKzwpa5s7MEljoXhwa2_6DG1QkJh1GTJ0SbegM2k6mjdEUN/exec";

  // 2) IP/PUERTO del Forti para auth:
  //    En tus capturas aparece: http://192.168.90.1:1000/fgtauth?...
  const FORTI_AUTH_BASE = "http://192.168.90.1:1000/fgtauth";

  const qs = new URLSearchParams(location.search);
  const magic = qs.get("magic") || "";
  const redir = qs.get("redir") || qs.get("redirect") || "";

  // Algunos Forti mandan el "magic" y a veces también "4Tredir" u otros nombres.
  // Si quieres, luego lo afinamos con un ejemplo de URL real.

  const msg = document.getElementById("msg");
  const err = document.getElementById("err");
  const btn = document.getElementById("btn");

  if (!magic) {
    msg.textContent = "Aviso: no se detectó el parámetro 'magic'. Si no vienes desde el portal cautivo, esto es normal.";
  }

  document.getElementById("f").addEventListener("submit", async (ev) => {
    ev.preventDefault();
    err.textContent = "";
    btn.disabled = true;
    btn.textContent = "Enviando...";

    const form = ev.target;
    const payload = {
      nombre: form.nombre.value.trim(),
      empresa: form.empresa.value.trim(),
      motivo: form.motivo.value.trim(),
      email: form.email.value.trim(),
      telefono: form.telefono.value.trim(),
      userAgent: navigator.userAgent,
      clientIp: "",       // desde navegador no hay IP real; lo dejamos vacío
      magic,
      redir
    };

    try {
      // Guardar en Google Sheets
      if (SHEET_ENDPOINT && !SHEET_ENDPOINT.includes("PEGAR_AQUI")) {
        const r = await fetch(SHEET_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const j = await r.json().catch(() => ({}));
        if (!r.ok || j.ok === false) throw new Error("No se pudo registrar la solicitud.");
      }

      // Liberar en Fortinet
      if (!magic) {
        msg.textContent = "Formulario enviado. Pero falta el parámetro 'magic' para autorizar en Fortinet.";
        btn.disabled = false;
        btn.textContent = "Enviar y conectar";
        return;
      }

      msg.textContent = "Autorizando acceso...";
      const u = new URL(FORTI_AUTH_BASE);
      u.searchParams.set("magic", magic);

      // Algunos Forti usan "redir=" para volver a la página original
      if (redir) u.searchParams.set("redir", redir);

      // Redirigir al Forti para que libere sesión
      location.href = u.toString();

    } catch (e) {
      err.textContent = "Error: " + (e?.message || String(e));
      btn.disabled = false;
      btn.textContent = "Enviar y conectar";
    }
  });
</script>
</body>
</html>
